<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>Page Not Found | MiroFish</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #152033;
      --muted: #5a6578;
      --line: #d9e0ea;
      --accent: #0f7f72;
      --surface: #f7f9fc;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--surface);
    }

    main {
      width: min(640px, calc(100% - 40px));
      padding: 56px 0;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 12px;
      font-size: clamp(2.1rem, 5vw, 4.2rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .primary {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: #ffffff;
      background: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">404</div>
    <h1>Page not found.</h1>
    <p>The page you requested is not available on MiroFish. Return to the main simulation workspace or review the guide pages from the homepage.</p>
    <div class="actions">
      <a class="primary" href="/">Go to MiroFish</a>
      <a href="/mirofish-ai/">Read the AI guide</a>
    </div>
  </main>
</body>
</html>
